name: Backend CI/CD

# Se déclenche à chaque push et pull request touchant le dossier backend/,
# sur la branche main (et develop si tu adoptes la stratégie de branches prévue)
on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

defaults:
  run:
    working-directory: backend

jobs:
  # ---------------------------------------------------------
  # JOB CI : vérifie que le code est valide avant tout déploiement
  # ---------------------------------------------------------
  ci:
    runs-on: ubuntu-latest

    # Une vraie base PostgreSQL éphémère, pour que "prisma migrate" et
    # de futurs tests d'intégration puissent réellement se connecter
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      JWT_SECRET: ci_test_secret_key

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier la validité du schéma Prisma
        run: npx prisma validate

      - name: Appliquer les migrations sur la base de test
        run: npx prisma migrate deploy

      # Décommente dès que ESLint est configuré (prévu dans la roadmap qualité)
      # - name: Lint
      #   run: npm run lint

      # Décommente dès qu'une suite de tests automatisés existe
      # - name: Tests
      #   run: npm test

      - name: Vérifier que le serveur démarre sans erreur
        run: |
          npm run start &
          SERVER_PID=$!
          sleep 3
          curl --fail http://localhost:5000/api/health
          kill $SERVER_PID

  # ---------------------------------------------------------
  # JOB CD : déploiement — désactivé par défaut (if: false)
  # À activer une fois l'hébergeur choisi (Render/Railway/autre)
  # ---------------------------------------------------------
  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: false && github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Déclencher le déploiement sur Render
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
        # RENDER_DEPLOY_HOOK_URL est un secret à ajouter dans
        # GitHub → Settings → Secrets and variables → Actions
