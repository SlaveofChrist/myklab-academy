version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: myklab-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-myklab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myklab_password}
      POSTGRES_DB: ${POSTGRES_DB:-myklab_dev_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: myklab-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@myklab.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-adminpassword}
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
